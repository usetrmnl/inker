name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Test backend
        run: cd backend && bun install --frozen-lockfile && bun test
      - name: Test frontend
        run: cd frontend && bun install --frozen-lockfile && bun run test
